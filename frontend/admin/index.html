<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NgoenSai Admin</title>
    <style>
      :root, [data-theme="light"] {
        --bg-primary: #F0F2F5;
        --sidebar-bg: #1A1A2E;
        --sidebar-text: #FFF;
        --nav-text: rgba(255,255,255,0.7);
        --nav-active-bg: rgba(26,140,255,0.2);
        --nav-active-text: #1A8CFF;
        --border-color: rgba(255,255,255,0.1);
        --card-bg: #FFF;
        --text-primary: #1A1A2E;
        --text-secondary: #6B7280;
        --text-muted: #9CA3AF;
      }
      [data-theme="dark"] {
        --bg-primary: #0F0F1A;
        --sidebar-bg: #16162A;
        --sidebar-text: #E0E0E0;
        --nav-text: rgba(255,255,255,0.5);
        --nav-active-bg: rgba(26,140,255,0.15);
        --nav-active-text: #60A5FA;
        --border-color: rgba(255,255,255,0.08);
        --card-bg: #1E1E3A;
        --text-primary: #E0E0E0;
        --text-secondary: #9CA3AF;
        --text-muted: #6B7280;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
      }
      * { box-sizing: border-box; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
