name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: backend/go.sum
      - run: go mod download
      - run: go build ./...
      - run: go vet ./...
      - run: go test ./tests/... -v -count=1

  mobile:
    name: Mobile App (React Native / Expo)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx expo export --platform web --output-dir dist 2>/dev/null || echo "Expo export skipped (requires native build)"

  admin:
    name: Admin Dashboard (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/admin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/admin/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build

  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: latest
          working-directory: backend
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Prettier check (admin)
        run: |
          cd frontend/admin && npx prettier --check "src/**/*.{ts,tsx}" 2>/dev/null || echo "Prettier check skipped"
