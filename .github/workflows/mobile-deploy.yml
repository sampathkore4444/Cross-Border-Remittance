name: Mobile Deploy

on:
  push:
    branches: [main]
    paths:
      - 'frontend/mobile/**'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS Build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

jobs:
  build:
    name: EAS Build (${{ github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/mobile/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - name: Generate app assets
        run: node scripts/generate-assets.js
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: EAS Build
        run: |
          eas build \
            --platform all \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  submit-ios:
    name: Submit iOS to TestFlight
    needs: build
    if: github.event.inputs.profile == 'production'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm install -g eas-cli
      - run: eas submit --platform ios --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  submit-android:
    name: Submit Android to Play Store
    needs: build
    if: github.event.inputs.profile == 'production'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm install -g eas-cli
      - run: eas submit --platform android --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
